meters:
- name: pro_seats
  description: Pro subscription seats unlocking premium cloud LLMs for Copilot.
  unit: seats
  aggregation: sum
  dimensions:
  - account
  - plan
- name: teams_seats
  description: Teams seats for cloud sync and collaboration (quote-based).
  unit: seats
  aggregation: sum
  dimensions:
  - account
  - plan
- name: local_inference_compute
  description: On-device model inference - hardware compute and energy, not billed by Pieces.
  unit: device_hours
  aggregation: sum
  dimensions:
  - device
  - model
- name: cloud_model_requests
  description: Copilot requests routed to cloud models under the active plan.
  unit: requests
  aggregation: sum
  dimensions:
  - account
  - model
principles:
- name: Visibility
  description: Track active Pro/Teams seats and which work routes to cloud vs. local models.
- name: Allocation
  description: Map Pro seats to developers/teams; tag cloud-model usage to projects.
- name: Optimization
  description: Default to free on-device local models for routine Copilot work; reserve paid cloud models for tasks needing frontier quality.
- name: Accountability
  description: Review seat counts and cloud-vs-local routing against budget; right-size the subscription tier.
