description: >-
  FinOps view of Pieces spend. The Pieces OS local API and on-device models are
  free and incur no per-call cost - inference cost is the local hardware's
  compute and energy, not a billed line item. Direct monetary spend comes from
  the optional Pro subscription (premium cloud LLMs for Copilot) and Teams
  (cloud sync/collaboration, quote-based). Cost optimization therefore centers
  on choosing local on-device models for routine work and reserving the paid
  cloud subscription for cases that require premium frontier models.
notes: >-
  No usage-metered API billing exists for the local API; cost is subscription-
  based (Pro per-seat) plus implicit local compute. Verify subscription pricing
  on the Pieces paid-plans page during reconciliation.
